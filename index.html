<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoQ Draft 14 BBB Player</title>
    <style>
      :root {
        --bg: #f6f2e8;
        --fg: #1f1d1a;
        --muted: #665f56;
        --line: #d9cfbf;
        --panel: rgba(255, 251, 244, 0.92);
        --accent: #a2401f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        color: var(--fg);
        background:
          radial-gradient(circle at top right, rgba(162, 64, 31, 0.14), transparent 28%),
          linear-gradient(160deg, #f8f4ec, #f1eadf 60%, #e7ddd0);
        overflow-x: hidden;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 24px auto;
        display: grid;
        gap: 16px;
        min-width: 0;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        backdrop-filter: blur(14px);
        min-width: 0;
      }

      .hero {
        display: grid;
        gap: 12px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 3vw, 3.4rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .meta {
        color: var(--muted);
        font-size: 0.98rem;
      }

      .build-subtitle {
        color: var(--accent);
        font-size: 0.84rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
        min-width: 0;
      }

      .grid > * {
        min-width: 0;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 0.92rem;
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fffdfa;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: #2e2822;
      }

      .button-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .status {
        color: var(--muted);
        min-height: 24px;
        overflow-wrap: anywhere;
      }

      #playerMount {
        width: 100%;
        min-width: 0;
      }

      .player-video {
        display: block;
        width: 100%;
        max-width: 100%;
        border-radius: 16px;
        background: #080808;
        aspect-ratio: 16 / 9;
      }

      .player-moq {
        display: block;
        width: 100%;
        max-width: 100%;
        border-radius: 16px;
        overflow: hidden;
        background: #080808;
        aspect-ratio: 16 / 9;
      }

      .placeholder {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 16px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent),
          radial-gradient(circle at 20% 20%, rgba(162, 64, 31, 0.35), transparent 35%),
          #080808;
        color: rgba(255, 250, 240, 0.78);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }

      pre {
        margin: 0;
        padding: 14px;
        border-radius: 14px;
        background: #181512;
        color: #f4ead8;
        font-family: "SF Mono", "Menlo", monospace;
        font-size: 12px;
        line-height: 1.5;
        overflow: auto;
        min-height: 240px;
        max-width: 100%;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        main {
          width: min(100vw - 16px, 1180px);
          margin: 8px auto 20px;
          gap: 12px;
        }

        .panel {
          padding: 14px;
          border-radius: 14px;
        }

        .button-row {
          display: grid;
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }

        pre {
          min-height: 180px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel hero">
        <h1>MoQ Draft 14<br />Big Buck Bunny</h1>
        <p class="build-subtitle" id="buildSubtitle"></p>
        <p class="meta">
          当前页面基于 <code>moq-js / video-moq</code> 播放链路，目标是
          <code>draft-14.cloudflare.mediaoverquic.com</code> 上的
          <code>namespace=bbb</code>。解码与渲染由 <code>WebCodecs + canvas</code> 完成，页面不启用默认播放控件。
        </p>
      </section>

      <section class="grid">
        <aside class="panel">
          <label>
            Relay URL
            <input id="url" value="https://draft-14.cloudflare.mediaoverquic.com/" />
          </label>
          <label>
            Namespace
            <input id="namespace" value="bbb" />
          </label>
          <div class="button-row">
            <button id="start">创建播放器</button>
            <button class="secondary" id="stop">停止</button>
          </div>
          <p class="status" id="status">等待开始。</p>
        </aside>

        <section class="panel">
          <div id="playerMount">
            <div class="placeholder">
              <p>播放器尚未创建。<br />点击左侧按钮后会在这里启动 <code>@moq/lite + @moq/hang</code> 播放链路。</p>
            </div>
          </div>
        </section>
      </section>

      <section class="panel">
        <h2>日志</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
